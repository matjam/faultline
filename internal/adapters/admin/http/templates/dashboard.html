{{define "content"}}
<div class="flex flex-col gap-4">

  <h1 class="terminal-section-title">// status overview</h1>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
    <div class="card bg-base-100">
      <div class="card-body">
        <div class="text-xs opacity-60">faultline version</div>
        <div class="stat-value glow">{{.Version}}</div>
        <div class="text-xs opacity-60 mt-1">{{.GoVersion}}</div>
      </div>
    </div>
    <div class="card bg-base-100">
      <div class="card-body">
        <div class="text-xs opacity-60">process uptime</div>
        <div class="stat-value glow">{{.Uptime}}</div>
        <div class="text-xs opacity-60 mt-1">since {{.StartedAt}}</div>
      </div>
    </div>
    <div class="card bg-base-100">
      <div class="card-body">
        <div class="text-xs opacity-60">active admin sessions</div>
        <div class="stat-value glow">{{.SessionCount}}</div>
        <div class="text-xs opacity-60 mt-1">browsers signed in</div>
      </div>
    </div>
  </div>

  <div id="agent-status"
       hx-get="/admin/fragments/status"
       hx-trigger="load, every 1s"
       hx-swap="innerHTML">
    <div class="card bg-base-100">
      <div class="card-body">
        <div class="skeleton h-6 w-48 mb-2"></div>
        <div class="skeleton h-4 w-full"></div>
      </div>
    </div>
  </div>

  <div id="tool-feed"
       hx-get="/admin/fragments/tools"
       hx-trigger="load, every 1s"
       hx-swap="innerHTML">
    <div class="card bg-base-100">
      <div class="card-body">
        <div class="skeleton h-6 w-40 mb-2"></div>
        <div class="skeleton h-4 w-full"></div>
      </div>
    </div>
  </div>

</div>
{{end}}
