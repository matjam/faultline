{{define "content"}}
<div class="flex flex-col gap-3">
  <h1 class="terminal-section-title">// log stream</h1>

  <div class="flex items-center gap-3 flex-wrap text-sm">
    <span class="opacity-70">tail of today's log</span>
    {{if .LogPath}}
    <span class="font-mono opacity-60">{{.LogPath}}</span>
    {{end}}
    <span class="ml-auto opacity-60">refreshing every 2s</span>
  </div>

  <div id="log-stream"
       hx-get="/admin/fragments/logs"
       hx-trigger="load, every 2s"
       hx-swap="innerHTML">
    <div class="log-view">loading…</div>
  </div>
</div>
{{end}}
