{{define "content"}}
<div class="flex flex-col gap-4">
  <h1 class="terminal-section-title">// version &amp; updates</h1>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
    <div class="card bg-base-100">
      <div class="card-body">
        <div class="text-xs opacity-60">running</div>
        <div class="stat-value glow">{{.Version}}</div>
        <div class="text-xs opacity-60 mt-1">{{.GoVersion}}</div>
      </div>
    </div>
    <div class="card bg-base-100">
      <div class="card-body">
        <div class="text-xs opacity-60">started</div>
        <div class="stat-value glow text-3xl">{{.Uptime}}</div>
        <div class="text-xs opacity-60 mt-1">since {{.StartedAt}}</div>
      </div>
    </div>
  </div>

  <div id="update-card"
       hx-get="/admin/fragments/update"
       hx-trigger="load, every 30s"
       hx-swap="innerHTML">
    <div class="card bg-base-100">
      <div class="card-body">
        <div class="skeleton h-6 w-32 mb-2"></div>
        <div class="skeleton h-4 w-full"></div>
      </div>
    </div>
  </div>
</div>
{{end}}
