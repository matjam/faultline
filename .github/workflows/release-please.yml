name: release-please

# Runs on every push to main. release-please reads the conventional
# commit log since the last release and maintains an open "release PR"
# titled e.g. 'chore: release v0.2.0' that bumps version files and
# updates CHANGELOG.md. Merging that PR creates a git tag, which then
# triggers .github/workflows/release.yml to build binaries.

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          # Push tags using a Personal Access Token rather than the
          # default GITHUB_TOKEN. GitHub deliberately suppresses
          # workflow-from-workflow chains when the pushing identity is
          # GITHUB_TOKEN, which would prevent the release workflow from
          # firing on tag push. PAT-pushed tags trigger downstream
          # workflows normally.
          #
          # The token must be a fine-grained PAT scoped to this repo
          # with: Contents (Read+Write), Pull requests (Read+Write).
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # When release-please cuts a release (i.e. the release PR was just
      # merged), augment the GitHub Release body with GitHub's auto-
      # generated "What's Changed" section. release-please's own body is
      # built from conventional-commit subjects only; auto-notes pull in
      # PR titles, authors, and links so the release page actually tells
      # readers what landed. CHANGELOG.md in the repo is left untouched.
      - name: Enrich release body with auto-generated PR list
        if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          TAG: ${{ steps.release.outputs.tag_name }}
        run: |
          set -euo pipefail
          generated=$(gh api \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="$TAG" \
            --jq .body)
          existing=$(gh release view "$TAG" --json body --jq .body)
          {
            printf '%s\n\n---\n\n' "$existing"
            printf '%s\n' "$generated"
          } > release-body.md
          gh release edit "$TAG" --notes-file release-body.md
