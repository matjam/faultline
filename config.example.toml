# Faultline example configuration.
#
# Copy this file to config.toml (or another path passed via -config) and edit
# for your deployment. All sections are optional; missing fields fall back to
# the defaults documented inline below.
#
# Run as:    ./faultline -config /path/to/config.toml

# ---------------------------------------------------------------------------
# [api] — LLM backend connection.
#
# Faultline targets any OpenAI-compatible /v1/chat/completions endpoint.
# Tested with KoboldCpp, llama.cpp's openai bridge, vLLM, and real OpenAI.
# ---------------------------------------------------------------------------
[api]
# Base URL including the version prefix. Faultline appends /chat/completions.
url = "http://localhost:5001/v1"

# Bearer token. Leave empty for backends that don't require auth.
key = ""

# Model identifier. Sent in the request body; backends that serve a single
# model usually accept any string.
model = "qwen"

# Auto-detect KoboldCpp-specific endpoints (real tokenizer, generation abort,
# perf metrics). Safe to leave true on non-KoboldCpp backends — detection
# fails silently and the agent falls back to a heuristic token estimator.
kobold_extras = true

# ---------------------------------------------------------------------------
# [agent] — agent loop, sampler params, persistence.
# ---------------------------------------------------------------------------
[agent]
# Directory for the agent's mutable memory store (markdown files, prompts,
# trash). Created if missing.
memory_dir = "./memory"

# Hard ceiling for context size. Agent forces compaction at 95% of this.
max_tokens = 262144

# Compaction threshold. When the conversation exceeds this many tokens, the
# agent is asked to save state and produce a summary; context is then rebuilt
# from system prompt + recent memories + that summary.
compaction_threshold = 150000

# Maximum tokens per response.
max_response_tokens = 4096

# Path to a JSON file holding the live conversation log. Atomic save before
# every LLM call; restored on startup so the agent resumes mid-conversation
# across restarts. The system message is always rebuilt from current prompts
# and memories on load. Empty string disables persistence.
state_file = "./state.json"

# Upper bound enforced by the `sleep` tool. The agent can request shorter
# sleeps; longer ones are clamped to this value. Operator messages and
# forced shutdown still interrupt mid-sleep regardless of this setting.
max_sleep = "15m"

# --- Sampler parameters ----------------------------------------------------
# OpenAI-spec fields (sent on every request):
temperature       = 0.8
top_p             = 0.0   # 0 = unset; server uses its default
presence_penalty  = 0.0
frequency_penalty = 0.0
seed              = 0     # 0 = unset; random seed each call

# Vendor-extension fields. Not in the OpenAI spec but accepted as additional
# JSON keys by KoboldCpp / llama.cpp / vLLM. Unknown fields are silently
# ignored by servers that don't recognize them, so it's safe to set these
# regardless of backend. 0 = unset.
top_k              = 0
min_p              = 0.0
repetition_penalty = 0.0

# ---------------------------------------------------------------------------
# [telegram] — optional collaborator messaging.
#
# When both fields are set, the agent advertises the send_message tool and
# accepts incoming messages from the configured chat ID. Leave both empty to
# disable; the agent runs without a collaborator channel.
# ---------------------------------------------------------------------------
[telegram]
token   = ""
chat_id = 0

# ---------------------------------------------------------------------------
# [log] — logging.
# ---------------------------------------------------------------------------
[log]
# Console log level: debug | info | warn | error. The on-disk log always
# captures debug regardless of this setting.
level = "info"

# Directory for daily-rotated log files. Created if missing. Three streams:
#   <date>.log         — main slog stream (debug-level, everything)
#   chat-<date>.log    — human-readable LLM transcript
#   sandbox-<date>.log — sandbox execution log (when sandbox is enabled)
dir = "./logs"

# ---------------------------------------------------------------------------
# [sandbox] — Docker-backed multi-runtime execution.
#
# When enabled, the agent gets sandbox_* tools for writing/executing scripts
# in ephemeral Docker containers (one container per operation). Requires
# Docker in PATH.
#
# The default image is Faultline's own multi-runtime image (Arch-based;
# ships uv/uvx, python+pip, node+npm+npx, bun, deno, go, plus common CLI
# tools like curl, jq, ripgrep, fd, git). sandbox_execute drives Python
# via uv; sandbox_shell can drive any of the other runtimes directly.
# ---------------------------------------------------------------------------
[sandbox]
enabled = false

# Image to run scripts in. Pin to a versioned tag (e.g. :v1.4.0 or :v1)
# instead of :latest if you want a specific image version locked down for
# a deployment. The image is published from docker/sandbox/Dockerfile by
# the sandbox-image GitHub Actions workflow.
image = "ghcr.io/matjam/faultline-sandbox:latest"

# Sandbox working directory on the host. Mapped into the container as the
# script's CWD. Three subdirs are auto-created: scripts/, input/, output/.
dir = "./sandbox"

# Per-operation timeout. Includes container start, script execution, and
# package install/upgrade/remove operations.
timeout = "5m"

# Whether containers can reach the network. Off by default for safety.
network = false

# Memory limit passed to docker --memory.
memory_limit = "512m"

# ---------------------------------------------------------------------------
# [email] — optional IMAP email reading.
#
# When all four fields are set, the agent advertises the email_fetch tool.
# Connections are short-lived (one per fetch). Leave empty to disable.
# ---------------------------------------------------------------------------
[email]
host     = ""
port     = 993
user     = ""
password = ""

# ---------------------------------------------------------------------------
# [update] — automatic self-update.
#
# When enabled, a background goroutine polls the configured GitHub repo's
# releases on the given interval. If a newer version is available, the
# updater downloads the matching release tarball, verifies it against the
# published SHA256SUMS, atomically swaps the binary, and triggers graceful
# shutdown so the new binary takes over. The agent's get_version tool is
# always available; update_check / update_apply are advertised only when
# self-update is enabled.
#
# The LLM does not decide whether to update -- it can only kick off the
# same code path the polling goroutine runs. Disable here if you don't
# want auto-updates at all.
# ---------------------------------------------------------------------------
[update]
enabled = false

# How often to poll GitHub releases. Operator-triggered checks via the
# update_check tool run on demand regardless of this interval. Use shorter
# values (e.g. "5m") for fast iteration; the default is conservative
# enough not to risk GitHub rate-limit issues even if you run many agents.
check_interval = "1h"

# "owner/name" of the GitHub repository whose releases we poll.
github_repo = "matjam/faultline"

# What to do after a successful update applies. Options:
#   "exit"      - save state and os.Exit(0). Suitable for any process
#                 supervisor that respawns the unit (systemd, Docker,
#                 Kubernetes, runit, supervisord, etc.). This is the
#                 simplest and most common choice.
#   "self-exec" - save state and syscall.Exec the new binary, replacing
#                 the current process image. Same PID. Use this when
#                 running bare without a supervisor (tmux, screen,
#                 manual ./faultline run).
#   "command"   - save state, run restart_command (split on whitespace,
#                 detached), then exit. For custom orchestrators.
restart_mode = "exit"

# Only used when restart_mode = "command".
restart_command = ""

# Whether to consider releases marked as prerelease (alpha / beta / rc).
# Default false: stable releases only.
allow_prerelease = false

# Absolute path of the running binary. The updater swaps this file in
# place. Leave empty to auto-detect via os.Executable() at startup; you
# really only need to set this if running under unusual launchers that
# break os.Executable().
binary_path = ""

# ---------------------------------------------------------------------------
# [limits] — content-size caps for LLM-facing surfaces.
#
# Each limit applies to a different surface; when content is clipped, a
# retrieval hint is appended so the agent knows which tool to call to read
# the rest. Zero or negative values disable the cap for that surface.
# ---------------------------------------------------------------------------
[limits]
# Per-entry cap on each "Recent Memories" excerpt in the system prompt.
# Five entries are surfaced per turn.
recent_memory_chars = 8000

# Per-result cap for memory_search. Five results returned per query.
memory_search_result_chars = 6000

# Combined stdout+stderr cap for sandbox_execute and sandbox_shell. Larger
# output should be written to /output/ in the script and read back with
# sandbox_read.
sandbox_output_chars = 64000

# ---------------------------------------------------------------------------
# [embeddings] — semantic search (optional).
#
# When enabled, every memory file (except .trash/ and prompts/) is embedded
# via an OpenAI-compatible /v1/embeddings endpoint and stored in an
# in-memory vector index that is persisted to <memory_dir>/.vector/index.bin
# in a custom binary format. memory_search then returns BOTH BM25 (lexical)
# and semantic results in clearly labeled sections so the LLM can pick
# whichever is more relevant per query.
#
# Memory writes (memory_write / edit / append / insert / restore) trigger a
# synchronous re-embed of the affected file. Per-mutation latency goes up by
# ~50–200ms but search is always current. Embed failures are logged but do
# NOT block the memory write — the vector index is best-effort enrichment,
# not source of truth.
#
# Disabled by default. With OpenAI's text-embedding-3-small at $0.02/1M
# tokens, indexing 10k typical memory files is roughly $0.10 one-time.
# ---------------------------------------------------------------------------
[embeddings]
# Master toggle. When false, no embeddings client is constructed and
# memory_search is BM25-only. The other fields below are ignored.
enabled = false

# OpenAI-compatible API base URL ending in /v1. The adapter appends
# "/embeddings". Works with OpenAI, Ollama, LM Studio, vLLM, and anything
# else speaking the same wire shape.
url = "https://api.openai.com/v1"

# Bearer token. Required for OpenAI; leave empty for local servers that
# don't authenticate. Treat this as a secret — don't commit a populated
# config.toml.
api_key = ""

# Embedding model identifier. text-embedding-3-small is OpenAI's current
# cost/quality sweet spot (1536 dim, $0.02/1M tokens). text-embedding-3-large
# (3072 dim, $0.13/1M) is overkill for memory search.
#
# If you change this, the on-disk vector index records the old model name
# and will be discarded + rebuilt automatically on next startup.
model = "text-embedding-3-small"

# Per-request HTTP timeout. Longer than the chat completion default because
# batch embedding requests can be larger and the API is occasionally slow.
timeout = "30s"

# Maximum texts per /v1/embeddings call during the startup reconcile pass
# and any bulk re-indexing. Per-mutation embeds always send a single text
# and ignore this. OpenAI accepts up to 2048 inputs per call but smaller
# batches keep individual failures localized.
batch_size = 100
